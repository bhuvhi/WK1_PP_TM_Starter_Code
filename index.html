<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container my-3">
      <header class="text-center mb-3">
        <h1><i class="bi bi-check-circle"></i> Task Manager</h1>
        <p>Stay organized and get things done</p>
      </header>

      <!-- Add Task Section -->
      <div class="card mb-4">
        <div class="card-body">
          <form id="addTaskForm">
            <div class="input-group mb-3">
              <input
                type="text"
                id="taskInput"
                class="form-control"
                placeholder="Enter task title..."
                required
              />
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> Add
              </button>
            </div>
            <div
              id="addTaskError"
              class="alert alert-danger"
              role="alert"
              style="display: none"
            ></div>
          </form>
        </div>
      </div>

      <!-- Tasks List Section -->
      <div class="card mb-4">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <h5 class="mb-0"><i class="bi bi-list-task"></i> Tasks</h5>
          <span id="taskCount" class="badge bg-light text-dark">0 tasks</span>
        </div>
        <div class="card-body">
          <div id="tasksList">
            <div class="empty-state">
              <i class="bi bi-inbox"></i>
              <p>No tasks available. Add your first task above!</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div
        class="d-flex gap-2 justify-content-center flex-wrap"
        style="gap: 0.5rem"
      >
        <button id="saveBtn" class="btn btn-primary">
          <i class="bi bi-download"></i> Save
        </button>
        <button id="loadBtn" class="btn btn-secondary">
          <i class="bi bi-upload"></i> Load
        </button>
        <button id="clearBtn" class="btn btn-danger">
          <i class="bi bi-trash"></i> Clear
        </button>
      </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="index.js"></script>
  </body>
</html>
